# ============================================================
# Bristol LaunchPad — Wrangler Configuration
# Account: Riveraf30@gmail.com
# Deploy: wrangler deploy --config wrangler-launchpad.toml
# Secrets:
#   wrangler secret put ANTHROPIC_KEY --config wrangler-launchpad.toml
# Create D1:
#   wrangler d1 create bristoltalks-launchpad --config wrangler-launchpad.toml
# Create KV:
#   wrangler kv namespace create CACHE --config wrangler-launchpad.toml
# Migrate:
#   wrangler d1 execute bristoltalks-launchpad --remote --file=migrations/0004_launchpad.sql --config wrangler-launchpad.toml
# ============================================================

name               = "bristoltalks-launchpad"
main               = "src/launchpad-worker.js"
compatibility_date = "2024-09-23"
account_id         = "8cdcf88f537f86831975b2dc03cc617a"

[vars]
ENVIRONMENT  = "production"
PRODUCT_NAME = "Bristol LaunchPad"

[[d1_databases]]
binding       = "DB"
database_name = "bristoltalks-launchpad"
database_id   = "c3dbb953-cee1-457f-9f57-fb847df2f5d4"

[[kv_namespaces]]
binding = "CACHE"
id      = "c0de5a2f2fdc43b1bc719afc642d4082"

# Custom subdomain — activate after bristoltalks.com NS points to Cloudflare:
# Uncomment and run: wrangler deploy --config wrangler-launchpad.toml

# [[routes]]
# pattern = "launchpad.bristoltalks.com/*"
# zone_name = "bristoltalks.com"

# Secret — set via CLI:
# wrangler secret put ANTHROPIC_KEY --config wrangler-launchpad.toml
