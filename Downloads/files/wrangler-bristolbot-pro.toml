# ============================================================
# BristolBot Pro — Wrangler Configuration
# Account: Riveraf30@gmail.com
# Deploy: wrangler deploy --config wrangler-bristolbot-pro.toml
# Secrets:
#   wrangler secret put ANTHROPIC_KEY --config wrangler-bristolbot-pro.toml
# Create D1:
#   wrangler d1 create bristoltalks-pro-chat --config wrangler-bristolbot-pro.toml
# Migrate:
#   wrangler d1 execute bristoltalks-pro-chat --remote --file=migrations/0005_pro_chat.sql --config wrangler-bristolbot-pro.toml
# ============================================================

name               = "bristoltalks-bristolbot-pro"
main               = "src/bristolbot-pro-worker.js"
compatibility_date = "2024-09-23"
account_id         = "8cdcf88f537f86831975b2dc03cc617a"

[vars]
ENVIRONMENT  = "production"
PRODUCT_NAME = "BristolBot Pro"

[[d1_databases]]
binding       = "DB"
database_name = "bristoltalks-pro-chat"
database_id   = "ed547c27-e77b-4169-acd6-724a79b5945f"

# Custom subdomain — activate after bristoltalks.com NS points to Cloudflare:
# Uncomment and run: wrangler deploy --config wrangler-bristolbot-pro.toml

