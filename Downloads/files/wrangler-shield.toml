# Deploy: wrangler deploy --config wrangler-shield.toml
# Secrets:
#   wrangler secret put ANTHROPIC_KEY --config wrangler-shield.toml
#   wrangler secret put TURNSTILE_SECRET --config wrangler-shield.toml
# Create D1:
#   wrangler d1 create bristoltalks-shield --config wrangler-shield.toml
