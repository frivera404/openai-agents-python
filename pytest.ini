[pytest]
filterwarnings =
    ignore::pytest.PytestRemovedIn9Warning
    ignore::pytest.PytestUnknownMarkWarning
    ignore:.*asyncio.iscoroutinefunction.*:DeprecationWarning
    ignore:.*on_event is deprecated.*:DeprecationWarning
    ignore:.*asyncio.get_event_loop_policy.*:DeprecationWarning
    ignore:.*DefaultEventLoopPolicy.*:DeprecationWarning
    ignore:.*iscoroutinefunction.*:DeprecationWarning
    ignore:.*on_event.*:DeprecationWarning
    ignore:.*get_event_loop_policy.*:DeprecationWarning
testpaths =
    tests
asyncio_mode = auto
markers =
    allow_call_model_methods: mark tests that need to call model methods (integration-level)
